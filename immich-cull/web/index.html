<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>immich-cull</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; color: #e0e0e0; font-family: system-ui, sans-serif; overflow: hidden; }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 16px; background: #222; border-bottom: 1px solid #333;
    height: 34px; flex-shrink: 0;
  }
  .header h1 { font-size: 14px; font-weight: 600; color: #f0a040; }
  .stats { font-size: 12px; color: #999; display: flex; gap: 14px; }
  .stats .v { color: #e0e0e0; font-weight: 600; }

  .container { display: flex; height: calc(100vh - 34px); }

  /* Sidebar */
  .sidebar {
    width: 200px; min-width: 200px; overflow-y: auto; background: #1e1e1e;
    border-right: 1px solid #333; font-size: 12px;
  }
  .gi {
    padding: 5px 8px; cursor: pointer; border-bottom: 1px solid #262626;
    border-left: 3px solid transparent;
  }
  .gi:hover { background: #282828; }
  .gi.active { background: #2a2a2a; border-left-color: #f0a040; }
  .gi.decided { opacity: 0.4; }
  .gi .t { font-weight: 500; }
  .gi .m { color: #777; font-size: 11px; }

  /* Main content area */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Masonry grid - all images visible */
  .masonry {
    flex: 1; display: flex; flex-wrap: wrap; gap: 4px; padding: 4px;
    overflow-y: auto; align-content: start;
  }
  .masonry .img-wrap {
    position: relative; cursor: pointer; flex-grow: 1;
    border: 3px solid transparent; border-radius: 3px;
    transition: border-color 0.1s, opacity 0.15s;
    overflow: hidden;
  }
  .img-wrap.active { border-color: #f0a040; box-shadow: 0 0 6px rgba(240,160,64,0.5); }
  .img-wrap.keep { border-color: #4caf50; }
  .img-wrap.cull { border-color: #f44336; opacity: 0.4; }
  .img-wrap.active.keep, .img-wrap.active.cull { border-color: #f0a040; opacity: 1; }
  .img-wrap img { height: 100%; width: 100%; object-fit: cover; display: block; }
  .img-wrap .badge {
    position: absolute; top: 2px; left: 2px; font-size: 10px; font-weight: 700;
    padding: 1px 5px; border-radius: 3px; color: white;
  }
  .badge.kb { background: #4caf50; }
  .badge.cb { background: #f44336; }
  .img-wrap .meta {
    position: absolute; bottom: 0; left: 0; right: 0; font-size: 9px;
    color: #ddd; background: linear-gradient(transparent, rgba(0,0,0,0.85));
    padding: 12px 4px 3px; display: flex; justify-content: space-between;
  }
  .img-wrap .stars {
    position: absolute; top: 2px; right: 2px; font-size: 10px; color: #ffd700;
    text-shadow: 0 1px 2px rgba(0,0,0,0.8);
  }

  /* Preview overlay (only when image selected + needed) */
  .preview-overlay {
    position: fixed; top: 34px; left: 200px; right: 0; bottom: 0;
    background: rgba(0,0,0,0.92); display: flex; align-items: center;
    justify-content: center; z-index: 50;
  }
  .preview-overlay img { max-width: 95%; max-height: 90%; object-fit: contain; }
  .preview-overlay .info {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.85); padding: 6px 14px; border-radius: 6px;
    font-size: 13px; text-align: center; max-width: 80%;
  }
  .preview-overlay .close-hint {
    position: absolute; top: 12px; right: 16px; font-size: 12px; color: #888;
  }
  .preview-overlay .state-tag {
    position: absolute; top: 12px; left: 16px;
    font-size: 14px; font-weight: 700; padding: 3px 12px; border-radius: 4px;
  }
  .state-tag.keep { background: #4caf50; color: white; }
  .state-tag.cull { background: #f44336; color: white; }

  /* Action bar */
  .actions {
    display: flex; gap: 10px; padding: 7px 16px; background: #222;
    border-top: 1px solid #333; align-items: center; flex-shrink: 0;
  }
  .actions button {
    padding: 6px 16px; border: none; border-radius: 5px; cursor: pointer;
    font-size: 13px; font-weight: 500; transition: opacity 0.1s;
  }
  .actions button:hover { opacity: 0.85; }
  .bk { background: #4caf50; color: white; }
  .bc { background: #e53935; color: white; }
  .bb { background: #2196F3; color: white; }
  .ba { background: #f0a040; color: #1a1a1a; font-weight: 700; }
  .bs { background: #444; color: #aaa; }
  .bh { background: transparent; color: #666; border: 1px solid #444 !important; font-size: 12px; padding: 4px 10px; }

  .spacer { flex: 1; }
  .group-meta { font-size: 11px; color: #777; text-align: right; line-height: 1.4; }

  /* Help modal */
  .help-modal {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85); z-index: 200;
    display: flex; align-items: center; justify-content: center;
  }
  .help-modal .content {
    background: #2a2a2a; border-radius: 8px; padding: 24px 32px;
    max-width: 500px; font-size: 13px; line-height: 1.8;
  }
  .help-modal h2 { font-size: 16px; margin-bottom: 12px; color: #f0a040; }
  .help-modal kbd { background: #444; padding: 1px 6px; border-radius: 3px; font-family: monospace; color: #ddd; }
  .help-modal .col2 { display: grid; grid-template-columns: auto 1fr; gap: 2px 16px; }

  .empty { display: flex; align-items: center; justify-content: center; flex: 1; color: #666; }
</style>
</head>
<body>
<div class="header">
  <h1>immich-cull</h1>
  <div class="stats" id="stats"></div>
</div>
<div class="container">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"><div class="empty">Loading...</div></div>
</div>
<div id="overlay"></div>
<div id="helpModal"></div>

<script>
let groups = [];
let ci = -1;      // current group index
let si = -1;      // selected asset index (-1 = none selected)
let states = {};   // assetId -> 'keep' | 'cull' | null
let showPreview = false;
let showHelp = false;

function fmt(b) {
  if (b >= 1e9) return (b/1e9).toFixed(1)+' GB';
  if (b >= 1e6) return (b/1e6).toFixed(1)+' MB';
  if (b >= 1e3) return (b/1e3).toFixed(0)+' KB';
  return b+' B';
}

async function load() {
  groups = await (await fetch('/api/groups')).json();
  renderSidebar();
  updateStats();
  if (groups.length > 0) selectGroup(0);
}

function renderSidebar() {
  document.getElementById('sidebar').innerHTML = groups.map((g, i) => {
    const d = new Date(g.earliestDate);
    const ds = d.getFullYear() > 2000 ? d.toLocaleDateString('no',{day:'numeric',month:'short',year:'2-digit'}) : '?';
    return `<div class="gi ${i===ci?'active':''} ${g.decided?'decided':''}" onclick="selectGroup(${i})" id="gi-${i}">
      <div class="t">${g.count} photos &middot; ${ds}</div>
      <div class="m">${g.timeSpanMinutes}min &middot; ${fmt(g.totalBytes)}</div>
    </div>`;
  }).join('');
}

function selectGroup(idx) {
  ci = idx; si = -1; showPreview = false;
  const g = groups[idx];
  for (const a of g.assets) { if (!(a.id in states)) states[a.id] = null; }
  renderGroup();
  renderSidebar();
  document.getElementById('gi-'+idx)?.scrollIntoView({block:'nearest',behavior:'smooth'});
}

function renderGroup() {
  const g = groups[ci];
  if (!g) return;

  // Calculate image sizes for masonry: aim to fill the space
  // For <=4 images: ~50% height each; for 5-9: ~33%; for 10+: ~25%
  const count = g.assets.length;
  let imgH;
  if (count <= 3) imgH = 'calc(50vh - 50px)';
  else if (count <= 6) imgH = 'calc(33vh - 30px)';
  else if (count <= 12) imgH = 'calc(25vh - 25px)';
  else imgH = 'calc(20vh - 20px)';

  let cullBytes = 0;
  for (const a of g.assets) { if (states[a.id] === 'cull') cullBytes += (a.bytes||0); }

  document.getElementById('main').innerHTML = `
    <div class="masonry">
      ${g.assets.map((a, i) => {
        const s = states[a.id];
        return `<div class="img-wrap ${i===si?'active':''} ${s||''}"
                     onclick="clickImage(${i})" ondblclick="openPreview(${i})"
                     style="height:${imgH}">
          <img src="/api/preview?id=${encodeURIComponent(a.id)}" loading="lazy">
          ${s==='keep'?'<div class="badge kb">KEEP</div>':''}
          ${s==='cull'?'<div class="badge cb">CULL</div>':''}
          ${a.rating>0?`<div class="stars">${'★'.repeat(a.rating)}</div>`:''}
          <div class="meta"><span>${a.filename}</span><span>${fmt(a.bytes||0)}</span></div>
        </div>`;
      }).join('')}
    </div>
    <div class="actions">
      <button class="bk" onclick="doKeep()">Keep</button>
      <button class="bc" onclick="doCull()">Cull</button>
      <button class="bb" onclick="keepBestCullRest()">Best + Cull Rest</button>
      <button class="ba" onclick="approveGroup()">Approve & Next</button>
      <button class="bs" onclick="skipGroup()">Skip</button>
      <span class="spacer"></span>
      <div class="group-meta">
        ${g.count} photos &middot; ${g.timeSpanMinutes}min
        ${cullBytes > 0 ? ` &middot; cull saves ${fmt(cullBytes)}` : ''}
      </div>
      <button class="bh" onclick="toggleHelp()">?</button>
    </div>
  `;

  renderOverlay();
}

function clickImage(i) {
  if (si === i) { si = -1; showPreview = false; } // deselect
  else { si = i; showPreview = false; }
  renderGroup();
}

function openPreview(i) {
  si = i; showPreview = true;
  renderGroup();
}

function renderOverlay() {
  const el = document.getElementById('overlay');
  if (!showPreview || si < 0) { el.innerHTML = ''; return; }
  const g = groups[ci];
  const a = g.assets[si];
  const s = states[a.id];
  el.innerHTML = `
    <div class="preview-overlay" onclick="closePreview()">
      <img src="/api/preview?id=${encodeURIComponent(a.id)}" onclick="event.stopPropagation()">
      ${s ? `<div class="state-tag ${s}">${s.toUpperCase()}</div>` : ''}
      <div class="close-hint">Esc / click to close</div>
      <div class="info">
        <strong>${a.filename}</strong> &middot; ${fmt(a.bytes||0)} &middot;
        ${new Date(a.date).toLocaleString('no')}
        ${a.rating > 0 ? ' &middot; ' + '★'.repeat(a.rating) : ''}
      </div>
    </div>
  `;
}

function closePreview() { showPreview = false; renderOverlay(); }

function ensureSelected() {
  if (si < 0) { si = 0; renderGroup(); }
}

function doKeep() { ensureSelected(); markAsset('keep'); }
function doCull() { ensureSelected(); markAsset('cull'); }

function markAsset(s) {
  ensureSelected();
  const g = groups[ci];
  const a = g.assets[si];
  states[a.id] = states[a.id] === s ? null : s;
  if (si < g.assets.length - 1) si++;
  renderGroup();
}

function keepBestCullRest() {
  ensureSelected();
  const g = groups[ci];
  for (let i = 0; i < g.assets.length; i++) {
    states[g.assets[i].id] = i === si ? 'keep' : 'cull';
  }
  renderGroup();
}

function keepFirstN(n) {
  const g = groups[ci];
  for (let i = 0; i < g.assets.length; i++) {
    states[g.assets[i].id] = i < n ? 'keep' : 'cull';
  }
  renderGroup();
}

async function approveGroup() {
  const g = groups[ci];
  for (const a of g.assets) { if (!states[a.id]) states[a.id] = 'keep'; }
  const keep = g.assets.filter(a => states[a.id]==='keep').map(a => a.id);
  const cull = g.assets.filter(a => states[a.id]==='cull').map(a => a.id);
  await fetch(`/api/groups/${g.id}/decide`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({keep,cull}),
  });
  g.decided = true;
  updateStats(); renderSidebar(); nextUndecided();
}

async function skipGroup() {
  const g = groups[ci];
  await fetch(`/api/groups/${g.id}/decide`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({keep:[],cull:[],skipped:true}),
  });
  g.decided = true;
  updateStats(); renderSidebar(); nextUndecided();
}

function nextUndecided() {
  for (let i = ci+1; i < groups.length; i++) if (!groups[i].decided) { selectGroup(i); return; }
  for (let i = 0; i < ci; i++) if (!groups[i].decided) { selectGroup(i); return; }
}

async function updateStats() {
  const s = await (await fetch('/api/stats')).json();
  document.getElementById('stats').innerHTML = `
    <span><span class="v">${s.decided}</span>/${s.totalGroups}</span>
    <span style="color:#4caf50"><span class="v">${s.photosToKeep}</span> keep</span>
    <span style="color:#f44336"><span class="v">${s.photosToCull}</span> cull</span>
    <span style="color:#4caf50">save ${fmt(s.cullBytes)}</span>
    <span><span class="v">${s.remaining}</span> left</span>
  `;
}

function toggleHelp() {
  showHelp = !showHelp;
  document.getElementById('helpModal').innerHTML = showHelp ? `
    <div class="help-modal" onclick="toggleHelp()">
      <div class="content" onclick="event.stopPropagation()">
        <h2>Keyboard Shortcuts</h2>
        <div class="col2">
          <kbd>←</kbd> <kbd>→</kbd> <span>Select prev/next image</span>
          <kbd>↑</kbd> <kbd>↓</kbd> <span>Prev/next group</span>
          <kbd>K</kbd> or <kbd>J</kbd> <span>Keep selected image</span>
          <kbd>X</kbd> or <kbd>F</kbd> <span>Cull selected image</span>
          <kbd>B</kbd> <span>Keep selected, cull all others</span>
          <kbd>Shift+K</kbd> <span>Keep all in group</span>
          <kbd>Shift+X</kbd> <span>Cull all in group</span>
          <kbd>1</kbd>-<kbd>5</kbd> <span>Keep first N, cull rest</span>
          <kbd>A</kbd> or <kbd>Enter</kbd> <span>Approve group & next</span>
          <kbd>S</kbd> <span>Skip group</span>
          <kbd>Space</kbd> <span>Toggle preview of selected</span>
          <kbd>Esc</kbd> <span>Close preview / deselect</span>
          <kbd>?</kbd> <span>Toggle this help</span>
        </div>
        <p style="margin-top:12px;color:#999;font-size:12px">
          Undecided images default to <strong>keep</strong> on approve.<br>
          Groups sorted newest-first. Culled images go to Immich trash (30-day recovery).
        </p>
      </div>
    </div>
  ` : '';
}

document.addEventListener('keydown', (e) => {
  if (showHelp && e.key === 'Escape') { toggleHelp(); return; }
  if (showHelp) return;
  if (showPreview && e.key === 'Escape') { closePreview(); return; }
  if (ci < 0) return;
  const g = groups[ci];
  const shift = e.shiftKey;

  switch(e.key) {
    case 'ArrowRight': case 'd':
      e.preventDefault();
      if (si < g.assets.length - 1) { si++; renderGroup(); }
      else if (si === -1) { si = 0; renderGroup(); }
      break;
    case 'ArrowLeft': case 'g':
      e.preventDefault();
      if (si > 0) { si--; renderGroup(); }
      break;
    case 'ArrowDown':
      e.preventDefault();
      if (ci < groups.length - 1) selectGroup(ci + 1);
      break;
    case 'ArrowUp':
      e.preventDefault();
      if (ci > 0) selectGroup(ci - 1);
      break;
    case 'k': case 'j': markAsset('keep'); break;
    case 'K': case 'J':
      for (const a of g.assets) states[a.id] = 'keep';
      renderGroup(); break;
    case 'x': case 'f': markAsset('cull'); break;
    case 'X': case 'F':
      for (const a of g.assets) states[a.id] = 'cull';
      renderGroup(); break;
    case 'b': case 'B': keepBestCullRest(); break;
    case 'a': case 'Enter': e.preventDefault(); approveGroup(); break;
    case 's': if (!shift) skipGroup(); break;
    case ' ':
      e.preventDefault();
      if (si >= 0) { showPreview = !showPreview; renderGroup(); }
      break;
    case 'Escape':
      if (si >= 0) { si = -1; renderGroup(); }
      break;
    case '?': toggleHelp(); break;
    case '1': keepFirstN(1); break;
    case '2': keepFirstN(2); break;
    case '3': keepFirstN(3); break;
    case '4': keepFirstN(4); break;
    case '5': keepFirstN(5); break;
  }
});

load();
</script>
</body>
</html>
