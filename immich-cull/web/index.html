<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>immich-cull</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; color: #e0e0e0; font-family: system-ui, -apple-system, sans-serif; }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px; background: #252525; border-bottom: 1px solid #333;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .stats { font-size: 13px; color: #999; display: flex; gap: 16px; }
  .stats .stat-val { color: #e0e0e0; font-weight: 600; }

  .container { display: flex; height: calc(100vh - 49px); }

  /* Sidebar: group list */
  .sidebar {
    width: 280px; min-width: 280px; overflow-y: auto;
    background: #202020; border-right: 1px solid #333;
  }
  .group-item {
    padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #2a2a2a;
    transition: background 0.1s;
  }
  .group-item:hover { background: #2a2a2a; }
  .group-item.active { background: #333; border-left: 3px solid #f0a040; }
  .group-item.decided { opacity: 0.5; }
  .group-item .g-title { font-size: 14px; font-weight: 500; }
  .group-item .g-meta { font-size: 12px; color: #888; margin-top: 2px; }

  /* Main area */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Filmstrip */
  .filmstrip {
    display: flex; gap: 6px; padding: 12px; overflow-x: auto;
    background: #1e1e1e; border-bottom: 1px solid #333;
    min-height: 140px; align-items: center;
  }
  .film-thumb {
    position: relative; cursor: pointer; flex-shrink: 0;
    border: 3px solid transparent; border-radius: 4px;
    transition: border-color 0.15s, opacity 0.15s;
  }
  .film-thumb.selected { border-color: #f0a040; }
  .film-thumb.keep { border-color: #4caf50; }
  .film-thumb.cull { border-color: #f44336; opacity: 0.5; }
  .film-thumb img {
    height: 110px; width: auto; display: block; border-radius: 2px;
  }
  .film-thumb .badge {
    position: absolute; top: 2px; left: 2px; font-size: 10px; font-weight: 700;
    padding: 1px 5px; border-radius: 3px; color: white;
  }
  .film-thumb .badge.keep-badge { background: #4caf50; }
  .film-thumb .badge.cull-badge { background: #f44336; }
  .film-thumb .rating-badge {
    position: absolute; bottom: 2px; right: 2px; font-size: 11px;
    color: #ffd700;
  }
  .film-thumb .filename {
    position: absolute; bottom: 2px; left: 2px; font-size: 9px;
    color: #ccc; background: rgba(0,0,0,0.7); padding: 1px 4px; border-radius: 2px;
    max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* Preview */
  .preview {
    flex: 1; display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative; background: #111;
  }
  .preview img {
    max-width: 100%; max-height: 100%; object-fit: contain;
  }
  .preview .info {
    position: absolute; bottom: 12px; left: 12px; right: 12px;
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .preview .photo-info {
    background: rgba(0,0,0,0.8); padding: 8px 12px; border-radius: 6px;
    font-size: 13px;
  }

  /* Action bar */
  .actions {
    display: flex; gap: 10px; padding: 12px 20px; background: #252525;
    border-top: 1px solid #333; align-items: center; justify-content: center;
  }
  .actions button {
    padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 14px; font-weight: 500; transition: opacity 0.15s;
  }
  .actions button:hover { opacity: 0.85; }
  .btn-keep { background: #4caf50; color: white; }
  .btn-cull { background: #f44336; color: white; }
  .btn-skip { background: #555; color: #ccc; }
  .btn-approve { background: #f0a040; color: #1a1a1a; font-weight: 700; }
  .btn-keepall { background: #2196F3; color: white; }
  .actions .hint { font-size: 12px; color: #666; margin-left: 8px; }

  .shortcuts {
    font-size: 12px; color: #666; text-align: center; padding: 6px;
    background: #1e1e1e; border-top: 1px solid #2a2a2a;
  }
  kbd {
    background: #333; padding: 1px 6px; border-radius: 3px;
    font-family: monospace; color: #ccc; border: 1px solid #444;
  }

  .empty { display: flex; align-items: center; justify-content: center; flex: 1; color: #666; font-size: 18px; }
</style>
</head>
<body>
<div class="header">
  <h1>immich-cull</h1>
  <div class="stats" id="stats"></div>
</div>
<div class="container">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main">
    <div class="empty">Loading groups...</div>
  </div>
</div>

<script>
let groups = [];
let currentGroupIdx = -1;
let selectedAssetIdx = 0;
let assetStates = {}; // assetId -> 'keep' | 'cull' | null

async function load() {
  const resp = await fetch('/api/groups');
  groups = await resp.json();
  renderSidebar();
  updateStats();
  if (groups.length > 0) selectGroup(0);
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = groups.map((g, i) => `
    <div class="group-item ${i === currentGroupIdx ? 'active' : ''} ${g.decided ? 'decided' : ''}"
         onclick="selectGroup(${i})" id="gi-${i}">
      <div class="g-title">${g.count} photos</div>
      <div class="g-meta">
        ${g.timeSpanMinutes}min span &middot; dist ${g.avgDistance}
        ${g.decided ? ' &middot; done' : ''}
      </div>
      <div class="g-meta">${new Date(g.assets[0]?.date).toLocaleDateString()}</div>
    </div>
  `).join('');
}

function selectGroup(idx) {
  currentGroupIdx = idx;
  selectedAssetIdx = 0;

  // Initialize asset states for this group
  const g = groups[idx];
  for (const a of g.assets) {
    if (!(a.id in assetStates)) {
      assetStates[a.id] = null;
    }
  }

  // Auto-mark: best = keep (first one by default)
  renderGroup();
  renderSidebar();
}

function renderGroup() {
  const g = groups[currentGroupIdx];
  if (!g) return;

  const main = document.getElementById('main');
  const selected = g.assets[selectedAssetIdx];

  main.innerHTML = `
    <div class="filmstrip" id="filmstrip">
      ${g.assets.map((a, i) => {
        const state = assetStates[a.id];
        return `
          <div class="film-thumb ${i === selectedAssetIdx ? 'selected' : ''} ${state || ''}"
               onclick="selectAsset(${i})">
            <img src="/api/thumb?id=${encodeURIComponent(a.id)}" loading="lazy" alt="${a.filename}">
            ${state === 'keep' ? '<div class="badge keep-badge">KEEP</div>' : ''}
            ${state === 'cull' ? '<div class="badge cull-badge">CULL</div>' : ''}
            ${a.rating > 0 ? `<div class="rating-badge">${'★'.repeat(a.rating)}</div>` : ''}
            <div class="filename">${a.filename}</div>
          </div>
        `;
      }).join('')}
    </div>
    <div class="preview">
      <img src="/api/preview?id=${encodeURIComponent(selected.id)}" alt="${selected.filename}">
      <div class="info">
        <div class="photo-info">
          <strong>${selected.filename}</strong><br>
          ${new Date(selected.date).toLocaleString()}
          ${selected.rating > 0 ? ` &middot; ${selected.rating}★` : ''}
          ${selected.isFavorite ? ' &middot; ♥' : ''}
        </div>
      </div>
    </div>
    <div class="actions">
      <button class="btn-keep" onclick="markAsset('keep')">Keep (K)</button>
      <button class="btn-cull" onclick="markAsset('cull')">Cull (X)</button>
      <button class="btn-keepall" onclick="keepBestCullRest()">Keep Best, Cull Rest (B)</button>
      <button class="btn-approve" onclick="approveGroup()">Approve & Next (A)</button>
      <button class="btn-skip" onclick="skipGroup()">Skip (S)</button>
    </div>
    <div class="shortcuts">
      <kbd>←</kbd><kbd>→</kbd> navigate photos &middot;
      <kbd>K</kbd> keep &middot; <kbd>X</kbd> cull &middot;
      <kbd>B</kbd> keep best, cull rest &middot;
      <kbd>A</kbd> approve &middot; <kbd>S</kbd> skip &middot;
      <kbd>↑</kbd><kbd>↓</kbd> prev/next group
    </div>
  `;
}

function selectAsset(idx) {
  selectedAssetIdx = idx;
  renderGroup();
}

function markAsset(state) {
  const g = groups[currentGroupIdx];
  const a = g.assets[selectedAssetIdx];
  assetStates[a.id] = assetStates[a.id] === state ? null : state;
  // Auto-advance to next unmarked
  if (selectedAssetIdx < g.assets.length - 1) selectedAssetIdx++;
  renderGroup();
}

function keepBestCullRest() {
  const g = groups[currentGroupIdx];
  // Keep the currently selected, cull the rest
  for (let i = 0; i < g.assets.length; i++) {
    assetStates[g.assets[i].id] = i === selectedAssetIdx ? 'keep' : 'cull';
  }
  renderGroup();
}

async function approveGroup() {
  const g = groups[currentGroupIdx];
  const keep = g.assets.filter(a => assetStates[a.id] === 'keep').map(a => a.id);
  const cull = g.assets.filter(a => assetStates[a.id] === 'cull').map(a => a.id);

  // If no explicit decisions, keep first and cull rest
  if (keep.length === 0 && cull.length === 0) {
    assetStates[g.assets[0].id] = 'keep';
    for (let i = 1; i < g.assets.length; i++) {
      assetStates[g.assets[i].id] = 'cull';
    }
    return approveGroup();
  }

  await fetch(`/api/groups/${g.id}/decide`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ keep, cull }),
  });

  g.decided = true;
  updateStats();
  renderSidebar();
  nextUndecided();
}

async function skipGroup() {
  const g = groups[currentGroupIdx];
  await fetch(`/api/groups/${g.id}/decide`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ keep: [], cull: [], skipped: true }),
  });
  g.decided = true;
  updateStats();
  renderSidebar();
  nextUndecided();
}

function nextUndecided() {
  for (let i = currentGroupIdx + 1; i < groups.length; i++) {
    if (!groups[i].decided) { selectGroup(i); return; }
  }
  // Wrap around
  for (let i = 0; i < currentGroupIdx; i++) {
    if (!groups[i].decided) { selectGroup(i); return; }
  }
}

async function updateStats() {
  const resp = await fetch('/api/stats');
  const s = await resp.json();
  document.getElementById('stats').innerHTML = `
    <span><span class="stat-val">${s.decided}</span>/${s.totalGroups} reviewed</span>
    <span><span class="stat-val" style="color:#4caf50">${s.photosToKeep}</span> keep</span>
    <span><span class="stat-val" style="color:#f44336">${s.photosToCull}</span> cull</span>
    <span><span class="stat-val">${s.remaining}</span> remaining</span>
  `;
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (currentGroupIdx < 0) return;
  const g = groups[currentGroupIdx];

  switch(e.key) {
    case 'ArrowRight':
      if (selectedAssetIdx < g.assets.length - 1) { selectedAssetIdx++; renderGroup(); }
      break;
    case 'ArrowLeft':
      if (selectedAssetIdx > 0) { selectedAssetIdx--; renderGroup(); }
      break;
    case 'ArrowDown':
      e.preventDefault();
      if (currentGroupIdx < groups.length - 1) selectGroup(currentGroupIdx + 1);
      break;
    case 'ArrowUp':
      e.preventDefault();
      if (currentGroupIdx > 0) selectGroup(currentGroupIdx - 1);
      break;
    case 'k': case 'K': markAsset('keep'); break;
    case 'x': case 'X': markAsset('cull'); break;
    case 'b': case 'B': keepBestCullRest(); break;
    case 'a': case 'A': approveGroup(); break;
    case 's': case 'S': skipGroup(); break;
  }
});

load();
</script>
</body>
</html>
